name: RPi

on: [push, pull_request]

jobs:
  Build-RPi-Tests:
    runs-on: ubuntu-latest
    name: Build RPi Tests
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Build Tests
      uses: ./CI/Linux-32
      with:
        command: rebol -qws system/tests/build-arm-tests.r -t RPi && rebol -qws tests/build-arm-tests.r -t RPi

    - uses: actions/upload-artifact@v7
      with:
        name: arm-tests
        path: quick-test/runnable/arm-tests/
        retention-days: 3

  Run-tests-ARM:
    runs-on: ubuntu-24.04-arm
    needs: Build-RPi-Tests

    steps:
    - name: Install 32bit libs
      run: |
        sudo dpkg --add-architecture armhf
        sudo apt update
        sudo apt install libc6:armhf libgdk-pixbuf-2.0-0:armhf libssl3t64:armhf libcurl4t64:armhf
        sudo ln -s /lib/arm-linux-gnueabihf/libcrypto.so.3 /lib/arm-linux-gnueabihf/libcrypto.so.1.1

    - name: Retrieve tests
      uses: actions/download-artifact@v8
      with:
        name: arm-tests

    - name: Run tests
      run: |
        export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/.
        chmod +x run-all.sh
        ./run-all.sh
      working-directory: ./system

    # upload log file if any test failed
    - uses: actions/upload-artifact@v7
      if: failure()
      with:
        name: RS-Tests-Arm-log
        path: ./system/quick-test.log

    - name: Run tests
      run: |
        chmod +x run-all.sh
        ./run-all.sh
      working-directory: ./red

    - name: Setup SSH Debug Session
      if: failure() # Only runs if the previous step fails
      run: |
        # 1. Start the native Linux OpenSSH server
        sudo apt-get update && sudo apt-get install -y openssh-server
        sudo service ssh start

        # 2. Inject your public key so Codex can authenticate cleanly 
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PUBLIC_KEY }}" >> ~/.ssh/authorized_keys
        chmod 700 ~/.ssh && chmod 600 ~/.ssh/authorized_keys

        # 3. Create a raw, anonymous TCP reverse tunnel via Pinggy
        # This maps the runner's port 22 to a public address
        ssh -p 443 -R 0:localhost:22 -o StrictHostKeyChecking=no -o ServerAliveInterval=30 tcp@free.pinggy.io > pinggy.log 2>&1 &

        # 4. Wait for the tunnel to establish and print the connection target
        sleep 30
        echo "=== CODEX CONNECTION TARGET ==="
        grep -oE 'tcp://[a-zA-Z0-9.-]+:[0-9]+' pinggy.log || cat pinggy.log
        echo "================================="

        # 5. Keep runner alive non-interactively while Codex debugs
        # Codex can run 'touch /tmp/keepalive' over SSH to terminate the job
        while [ ! -f /tmp/keepalive ]; do
          sleep 10
        done

    # upload log file if any test failed
    - uses: actions/upload-artifact@v7
      if: failure()
      with:
        name: Red-Tests-Arm-log
        path: ./red/quick-test.log