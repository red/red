name: AI Review

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  review:
    name: Review pushed diff
    runs-on: [self-hosted, windows, x64, codex-review]
    timeout-minutes: 60

    steps:
      - name: Add Git to PATH
        shell: pwsh
        env:
          GIT_EXE: ${{ vars.GIT_EXE || secrets.GIT_EXE }}
        run: |
          $gitCandidates = @(
            "$env:GIT_EXE",
            "$env:ProgramFiles\Git\cmd\git.exe",
            "$env:ProgramFiles\Git\bin\git.exe",
            "${env:ProgramFiles(x86)}\Git\cmd\git.exe",
            "${env:ProgramFiles(x86)}\Git\bin\git.exe"
          )

          $git = $gitCandidates |
            Where-Object { -not [string]::IsNullOrWhiteSpace($_) } |
            Where-Object { Test-Path -LiteralPath $_ } |
            Select-Object -First 1

          if ([string]::IsNullOrWhiteSpace($git)) {
            throw "Unable to locate git.exe before checkout. Install Git for Windows or set GIT_EXE."
          }

          $gitDir = Split-Path -Parent $git
          Add-Content -Path $env:GITHUB_PATH -Value $gitDir -Encoding utf8
          Write-Host "Added Git to PATH: $gitDir"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Diagnose Git
        shell: pwsh
        env:
          GIT_EXE: ${{ vars.GIT_EXE || secrets.GIT_EXE }}
        run: |
          Write-Host "GITHUB_SHA=$env:GITHUB_SHA"
          Write-Host "GITHUB_WORKSPACE=$env:GITHUB_WORKSPACE"
          Write-Host "RUNNER_TEMP=$env:RUNNER_TEMP"
          Write-Host "RUNNER_TOOL_CACHE=$env:RUNNER_TOOL_CACHE"
          Write-Host "GIT_EXE=$env:GIT_EXE"
          Get-Command git -ErrorAction SilentlyContinue | Format-List Source,CommandType
          @(
            "$env:GIT_EXE",
            "$env:ProgramFiles\Git\cmd\git.exe",
            "$env:ProgramFiles\Git\bin\git.exe",
            "${env:ProgramFiles(x86)}\Git\cmd\git.exe",
            "${env:ProgramFiles(x86)}\Git\bin\git.exe",
            "$env:ProgramData\chocolatey\bin\git.exe",
            "$env:SystemDrive\Users\*\AppData\Local\Fork\gitInstance\*\bin\git.exe",
            "$env:RUNNER_TOOL_CACHE\Git\*\x64\bin\git.exe"
          ) | ForEach-Object {
            if (-not [string]::IsNullOrWhiteSpace($_)) {
              Resolve-Path -Path $_ -ErrorAction SilentlyContinue
            }
          }

      - name: Run Codex review
        shell: pwsh
        env:
          REVIEW_BEFORE: ${{ github.event.before }}
          REVIEW_SHA: ${{ github.sha }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GIT_EXE: ${{ vars.GIT_EXE || secrets.GIT_EXE }}
        run: |
          .\.github\scripts\codex-review-push.ps1 `
            -BeforeSha "$env:REVIEW_BEFORE" `
            -HeadSha "$env:REVIEW_SHA" `
            -DefaultBranch "$env:DEFAULT_BRANCH"

      - name: Upload review log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: local-ai-review
          path: |
            ${{ runner.temp }}/codex-review-output.md
            ${{ runner.temp }}/codex-review-last-message.md
            ${{ runner.temp }}/codex-review-transcript.txt
          if-no-files-found: ignore
