name: AI Review

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  review:
    name: Review pushed diff
    runs-on: [self-hosted, windows, x64, codex-review]
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Codex review
        shell: pwsh
        env:
          REVIEW_BEFORE: ${{ github.event.before }}
          REVIEW_SHA: ${{ github.sha }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          .\.github\scripts\codex-review-push.ps1 `
            -BeforeSha "$env:REVIEW_BEFORE" `
            -HeadSha "$env:REVIEW_SHA" `
            -DefaultBranch "$env:DEFAULT_BRANCH"

      - name: Upload review log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: local-ai-review
          path: |
            ${{ runner.temp }}/codex-review-output.md
            ${{ runner.temp }}/codex-review-last-message.md
            ${{ runner.temp }}/codex-review-transcript.txt
          if-no-files-found: ignore
