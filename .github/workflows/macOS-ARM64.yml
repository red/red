name: macOS ARM64

on: [push, pull_request]

jobs:
  Build-macOS-ARM64-Tests:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup Rebol
      run: |
        $url = "https://static.red-lang.org/build/rebview.exe"
        $output = "$Env:GITHUB_WORKSPACE\rebview.exe"
        (New-Object System.Net.WebClient).DownloadFile($url, $output)

    - name: Build macOS ARM64 tests
      shell: cmd
      run: rebview.exe -qws system\tests\sha256-test.r && rebview.exe -qws system\tests\build-arm-tests.r -t Darwin-ARM64 && rebview.exe -qws tests\build-arm-tests.r -t Darwin-ARM64

    - name: Build macOS ARM64 View smoke
      shell: cmd
      run: |
        mkdir build\macos-arm64-view-tests
        rebview.exe -cqs red.r -r -t macOS-ARM64 -d --show-func-map -o build\macos-arm64-view-tests\macos-arm64-view-smoke tests\source\view\macos-arm64-smoke.red
        if not exist build\macos-arm64-view-tests\macos-arm64-view-smoke.app\Contents\MacOS\macos-arm64-view-smoke exit /b 1

    - name: Validate macOS ARM64 test package
      shell: bash
      run: |
        system_package=quick-test/runnable/arm-tests/system
        red_package=quick-test/runnable/arm-tests/red

        test -f "$system_package/run-all.sh"
        test -f "$system_package/structlib.c"
        test -f "$system_package/darwin-arm64-abi-helper.c"
        test -f "$system_package/libtest-dll1.dylib"
        test -f "$system_package/libtest-dll2.dylib"

        system_count=$(find "$system_package" -maxdepth 1 -type f \
          ! -name 'run-all.sh' ! -name '*.c' ! -name '*.dylib' | wc -l)
        test "$system_count" -eq 49

        for binary in "$system_package"/*.dylib; do
          file "$binary" | grep -q 'Mach-O 64-bit arm64'
        done
        for binary in "$system_package"/*; do
          case "$binary" in
            *.c|*.dylib|*/run-all.sh) continue ;;
          esac
          file "$binary" | grep -q 'Mach-O 64-bit arm64 executable'
        done

        test -f "$red_package/run-all.sh"
        for binary in run-all-comp1 run-all-comp2 run-all-interp; do
          test -f "$red_package/$binary"
          file "$red_package/$binary" | grep -q 'Mach-O 64-bit arm64 executable'
        done

    - name: Upload macOS ARM64 test package
      uses: actions/upload-artifact@v7
      with:
        name: macos-arm64-tests
        path: quick-test/runnable/arm-tests/
        retention-days: 3

    - name: Upload macOS ARM64 View smoke
      uses: actions/upload-artifact@v7
      with:
        name: macos-arm64-view-smoke
        path: build/macos-arm64-view-tests/
        retention-days: 3

  Run-macOS-ARM64-Tests:
    runs-on: macos-latest
    timeout-minutes: 30
    needs: Build-macOS-ARM64-Tests
    steps:
    - name: Download macOS ARM64 test package
      uses: actions/download-artifact@v8
      with:
        name: macos-arm64-tests
        path: arm-tests

    - name: Download macOS ARM64 View smoke
      uses: actions/download-artifact@v8
      with:
        name: macos-arm64-view-smoke
        path: view-smoke

    - name: Verify native Apple Silicon runner
      shell: bash
      run: test "$(uname -m)" = arm64

    - name: Run macOS ARM64 Red/System tests
      working-directory: arm-tests/system
      run: sh ./run-all.sh

    - name: Run macOS ARM64 Red tests
      working-directory: arm-tests/red
      run: sh ./run-all.sh

    - name: Run macOS ARM64 native View smoke
      working-directory: view-smoke
      shell: bash
      run: |
        set -eu
        app=macos-arm64-view-smoke.app
        exe="$app/Contents/MacOS/macos-arm64-view-smoke"
        chmod 755 "$exe"
        file "$exe" | grep -q 'Mach-O 64-bit executable arm64'
        otool -hv "$exe" | grep -q ARM64
        otool -L "$exe" | grep -q 'AppKit.framework'
        dyld_info -validate_only "$exe"
        cp "$exe" macos-arm64-view-smoke.signature-probe
        chmod 755 macos-arm64-view-smoke.signature-probe
        codesign --verify --strict --verbose=4 macos-arm64-view-smoke.signature-probe
        rm macos-arm64-view-smoke.signature-probe
        rm -f macos-arm64-view-smoke.ok macos-arm64-view-smoke.error
        if ./$exe; then
          :
        else
          status=$?
          test ! -f macos-arm64-view-smoke.error || cat macos-arm64-view-smoke.error
          exit "$status"
        fi
        test "$(cat macos-arm64-view-smoke.ok)" = MACOS-ARM64-VIEW-OK

    - name: Upload failure logs
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: macos-arm64-test-logs
        path: |
          arm-tests/system/quick-test.log
          arm-tests/red/quick-test.log
          view-smoke/macos-arm64-view-smoke.error
